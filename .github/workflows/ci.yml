name: CI - legacy-billing

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Package artifact
        run: |
          mkdir -p artifact
          cp -r . artifact/legacy-billing
          echo "Artifact created successfully"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: legacy-billing-artifact
          path: artifact/
